<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin - Audrey Stypulkowski</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    /* ================================================================
       ADMIN-SPECIFIC STYLES
       Only patterns not covered by the utility-first framework.
       ================================================================ */

    /* -- Login screen -- */
    .login-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--color-bg-dark) 0%, var(--color-primary-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--color-white);
      border-radius: var(--rounded-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--space-10);
      width: 90vw;
      max-width: 420px;
    }

    .login-logo {
      width: 56px;
      height: 56px;
      border-radius: var(--rounded-xl);
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-5);
      color: var(--color-white);
      font-weight: 700;
      font-size: var(--text-xl);
    }

    /* -- Top bar -- */
    .admin-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--color-white);
      box-shadow: var(--shadow);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-6);
    }

    /* -- Editor layout -- */
    .admin-body {
      padding-top: 56px;
      padding-bottom: 48px;
      min-height: 100vh;
      background: var(--color-bg-light);
    }

    .admin-content {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--space-6);
    }

    /* -- Section divider -- */
    .admin-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-8) 0 var(--space-4);
      color: var(--color-text-light);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .admin-divider::before,
    .admin-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* -- Sections (accordion) -- */
    .admin-section {
      background: var(--color-white);
      border-radius: var(--rounded-xl);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-4);
      overflow: hidden;
    }

    .admin-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-4) var(--space-6);
      font-weight: 600;
      font-size: var(--text-base);
      cursor: pointer;
      user-select: none;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      color: var(--color-text);
      transition: background-color var(--transition);
    }

    .admin-section-header:hover {
      background-color: var(--color-bg-light);
    }

    .admin-section-header .chevron {
      transition: transform var(--transition-slow);
      flex-shrink: 0;
      color: var(--color-text-light);
    }

    .admin-section.open .admin-section-header .chevron {
      transform: rotate(180deg);
    }

    .admin-section-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .admin-section.open .admin-section-content {
      max-height: none;
    }

    .admin-section-inner {
      padding: var(--space-6);
      border-top: 1px solid var(--color-border);
    }

    /* -- Field groups -- */
    .admin-field {
      margin-bottom: var(--space-4);
    }

    .admin-field:last-child {
      margin-bottom: 0;
    }

    .admin-label {
      display: block;
      font-weight: 500;
      font-size: var(--text-sm);
      color: var(--color-text);
      margin-bottom: 0;
    }

    .admin-hint {
      font-size: var(--text-xs);
      color: var(--color-text-light);
      margin: var(--space-1) 0 var(--space-2);
    }

    /* -- Toggle switch (for popup enabled) -- */
    .admin-toggle {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .admin-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .admin-toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: var(--color-border);
      border-radius: var(--rounded-full);
      transition: background-color var(--transition);
    }

    .admin-toggle-slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: var(--color-white);
      border-radius: 50%;
      transition: transform var(--transition);
    }

    .admin-toggle input:checked + .admin-toggle-slider {
      background-color: var(--color-primary);
    }

    .admin-toggle input:checked + .admin-toggle-slider::before {
      transform: translateX(20px);
    }

    /* -- List items -- */
    .admin-list-item {
      border: 1px solid var(--color-border);
      border-radius: var(--rounded-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      display: flex;
      gap: var(--space-4);
      align-items: flex-start;
      background: var(--color-bg-light);
      transition: box-shadow var(--transition);
    }

    .admin-list-item:hover {
      box-shadow: var(--shadow-sm);
    }

    .admin-list-item--compact {
      padding: var(--space-2) var(--space-3);
      margin-bottom: var(--space-1);
      align-items: center;
    }

    .admin-list-item--compact .admin-list-item-title {
      margin-bottom: 0;
    }

    .admin-list-item-body {
      flex: 1;
      min-width: 0;
    }

    .admin-list-item-title {
      font-weight: 600;
      font-size: var(--text-sm);
      margin-bottom: var(--space-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-list-item-desc {
      font-size: var(--text-xs);
      color: var(--color-text-light);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .admin-actions {
      display: flex;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .admin-btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--rounded);
      border: 1px solid var(--color-border);
      background: var(--color-white);
      color: var(--color-text-light);
      cursor: pointer;
      transition: all var(--transition);
    }

    .admin-btn-icon:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .admin-btn-icon.danger:hover {
      border-color: var(--color-error);
      color: var(--color-error);
    }

    .admin-btn-icon:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* -- Thumbnail preview -- */
    .admin-thumbnail {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: var(--rounded-lg);
      border: 1px solid var(--color-border);
      flex-shrink: 0;
      background: var(--color-bg-light);
    }

    .admin-thumbnail-placeholder {
      width: 80px;
      height: 80px;
      border-radius: var(--rounded-lg);
      border: 2px dashed var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-text-light);
      font-size: var(--text-xs);
      background: var(--color-bg-light);
    }

    .admin-image-field {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .admin-file-input {
      display: none;
    }

    .admin-color-picker {
      width: 40px;
      height: 40px;
      padding: 2px;
      border: 1px solid var(--color-border);
      border-radius: var(--rounded);
      cursor: pointer;
      background: none;
    }

    .admin-color-text {
      font-size: var(--text-sm);
    }

    .admin-upload-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--rounded-lg);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      background: var(--color-white);
      color: var(--color-text-light);
      transition: all var(--transition);
    }

    .admin-upload-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    /* -- Add button -- */
    .admin-add-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border: 2px dashed var(--color-border);
      border-radius: var(--rounded-lg);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      background: none;
      color: var(--color-text-light);
      transition: all var(--transition);
      width: 100%;
      justify-content: center;
    }

    .admin-add-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-light);
    }

    /* -- Edit modal (inline expand) -- */
    .admin-edit-form {
      border: 1px solid var(--color-primary);
      border-radius: var(--rounded-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      background: var(--color-white);
      box-shadow: var(--shadow);
    }

    .admin-edit-form-actions {
      display: flex;
      gap: var(--space-2);
      justify-content: flex-end;
      margin-top: var(--space-4);
      padding-top: var(--space-3);
      border-top: 1px solid var(--color-border);
    }

    /* -- Status bar -- */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-white);
      border-top: 1px solid var(--color-border);
      padding: var(--space-2) var(--space-6);
      font-size: var(--text-sm);
      color: var(--color-text-light);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: var(--space-2);
    }

    .status-dot.connected { background: var(--color-success); }
    .status-dot.error { background: var(--color-error); }
    .status-dot.saving { background: var(--color-accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* -- Small utility overrides for admin -- */
    .btn-sm {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
    }

    .btn-ghost {
      background: none;
      color: var(--color-text-light);
      font-weight: 500;
    }

    .btn-ghost:hover {
      background: var(--color-bg-light);
      color: var(--color-text);
    }

    .btn-danger {
      background: none;
      color: var(--color-error);
      font-weight: 500;
    }

    .btn-danger:hover {
      background: rgba(220, 38, 38, 0.08);
    }

    .btn-success {
      background-color: var(--color-primary);
      color: var(--color-white);
    }

    .btn-success:hover {
      background-color: var(--color-primary-dark);
    }

    /* -- Loading spinner (reuse from old admin) -- */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .spinner-dark {
      border-color: rgba(0,0,0,0.1);
      border-top-color: var(--color-primary);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* -- Notification toast -- */
    .admin-toast {
      position: fixed;
      top: 72px;
      right: var(--space-6);
      z-index: 100;
      padding: var(--space-3) var(--space-5);
      border-radius: var(--rounded-lg);
      font-size: var(--text-sm);
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      transform: translateX(120%);
      transition: transform 0.3s ease;
    }

    .admin-toast.show {
      transform: translateX(0);
    }

    .admin-toast.success {
      background: var(--color-primary);
      color: var(--color-white);
    }

    .admin-toast.error {
      background: var(--color-error);
      color: var(--color-white);
    }

    /* -- EasyMDE overrides to match admin theme -- */
    .EasyMDEContainer .CodeMirror {
      border-color: var(--color-border);
      border-radius: 0 0 var(--rounded-lg) var(--rounded-lg);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      min-height: 120px;
    }

    .EasyMDEContainer .CodeMirror-focused {
      border-color: var(--color-primary);
      box-shadow: var(--ring-primary);
    }

    .EasyMDEContainer .editor-toolbar {
      border-color: var(--color-border);
      border-radius: var(--rounded-lg) var(--rounded-lg) 0 0;
    }

    .EasyMDEContainer .editor-toolbar button:hover {
      background: var(--color-bg-light);
    }

    .EasyMDEContainer .editor-toolbar button.active {
      background: var(--color-primary-light);
    }

    .EasyMDEContainer .editor-preview {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }

    /* Compact mode: single-line title fields */
    .EasyMDEContainer.compact .CodeMirror {
      min-height: 50px;
      max-height: 50px;
    }

    .EasyMDEContainer.compact .CodeMirror-scroll {
      min-height: 50px;
      max-height: 50px;
      overflow: hidden;
    }

    .EasyMDEContainer.compact .CodeMirror-hscrollbar,
    .EasyMDEContainer.compact .CodeMirror-vscrollbar {
      display: none;
    }

    /* -- Responsive admin topbar -- */
    @media (max-width: 640px) {
      .admin-topbar {
        padding: 0 var(--space-3);
        gap: var(--space-2);
      }

      .admin-topbar .btn-sm {
        padding: var(--space-1) var(--space-2);
        font-size: var(--text-xs);
      }

      .admin-topbar .btn-sm svg { display: none; }
    }
  </style>
</head>
<body>

  <!-- ================================================================
       LOGIN SCREEN
       ================================================================ -->
  <div id="login-screen" class="login-bg">
    <div class="login-card">
      <div class="login-logo">A</div>
      <h1 class="text-xl font-bold text-center mb-1">Audrey Stypulkowski</h1>
      <p class="text-sm text-light text-center mb-8">Administration</p>

      <div id="login-error" class="text-sm mb-4 hidden" style="color: var(--color-error);"></div>

      <button id="login-btn" class="btn btn-primary w-full" type="button" style="gap: var(--space-2);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Se connecter avec GitHub
      </button>

      <p class="text-xs text-light text-center mt-4">Connexion sécurisée via GitHub OAuth</p>
      <a href="/" class="text-xs text-light text-center block mt-6" style="text-decoration: underline;">← Retour au site</a>
    </div>
  </div>

  <!-- ================================================================
       EDITOR SCREEN
       ================================================================ -->
  <div id="editor-screen" class="hidden">

    <!-- Top bar -->
    <div class="admin-topbar">
      <a href="/" class="btn btn-sm btn-ghost">← Retourner au site</a>
      <div class="flex items-center gap-3">
        <button id="btn-preview" class="btn btn-sm btn-ghost" type="button" style="gap: var(--space-2);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Aperçu
        </button>
        <button id="btn-publish" class="btn btn-sm btn-success" type="button" style="gap: var(--space-2);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          Publier
        </button>
      </div>
    </div>

    <!-- Main editor body -->
    <div class="admin-body">
      <div class="admin-content" id="sections-container">
        <!-- Sections rendered by JS -->
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="flex items-center">
        <span class="status-dot connected" id="status-dot"></span>
        <span id="status-text">Connecté</span>
      </div>
      <span id="status-time" class="text-xs"></span>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="admin-toast"></div>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde@2/dist/easymde.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
